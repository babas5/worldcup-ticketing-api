info:
  name: Create ticket Not Found (match 666)
  type: http
  seq: 4

http:
  method: POST
  url: "{{host}}/tickets"
  body:
    type: json
    data: |-
      {
        "matchId": 666,
        "seat": "A12",
        "customer": {
          "firstname": "John",
          "lastname": "Doe",
          "email": "john@doe.com"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isFalsy
    - expression: res.body.error
      operator: eq
      value: Match 666 does not exist
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: req.method
      operator: eq
      value: POST

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
