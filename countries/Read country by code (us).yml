info:
  name: Read country by code (us)
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/countries/us"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Country USA
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data.name
      operator: eq
      value: USA
    - expression: res.body.data.code
      operator: eq
      value: us

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
