info:
  name: Read cities by country (us)
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/countries/us/cities"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((city) => {
          expect(city.country.code).to.equal("us");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Cities in USA
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].name
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
