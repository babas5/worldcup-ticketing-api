info:
  name: Read matchs by status (scheduled)
  type: http
  seq: 7

http:
  method: GET
  url: "{{host}}/matchs/status/scheduled"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((match) => {
          expect(match.status).to.equal("scheduled");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Matchs with status scheduled
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].homeTeam
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
