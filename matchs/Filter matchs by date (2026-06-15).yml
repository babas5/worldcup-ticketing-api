info:
  name: Filter matchs by date (2026-06-15)
  type: http
  seq: 6

http:
  method: GET
  url: "{{host}}/matchs?date=2026-06-15"
  params:
    - name: date
      value: 2026-06-15
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((match) => {
          expect(match.date).to.include("2026-06-15");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: "Matchs filtered by date: 2026-06-15"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
