info:
  name: Filter matchs by team code (ZZZ)
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/matchs?team[code]=ZZZ"
  params:
    - name: team[code]
      value: ZZZ
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: "Matchs filtered by team[code]: ZZZ"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data
      operator: isEmpty
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
