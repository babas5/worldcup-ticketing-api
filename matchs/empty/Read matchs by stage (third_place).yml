info:
  name: Read matchs by stage (third_place)
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/matchs/stages/third_place"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Matchs at stage third_place
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data
      operator: isEmpty
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
