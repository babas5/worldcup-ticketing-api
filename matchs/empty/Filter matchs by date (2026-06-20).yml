info:
  name: Filter matchs by date (2026-06-20)
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/matchs?date=2026-06-20"
  params:
    - name: date
      value: 2026-06-20
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: "Matchs filtered by date: 2026-06-20"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data
      operator: isEmpty
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
