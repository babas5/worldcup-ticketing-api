info:
  name: Filter matchs by team code (FRA)
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/matchs?team[code]=FRA"
  params:
    - name: team[code]
      value: FRA
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((match) => {
          const codes = [match.homeTeam.code.value, match.awayTeam.code.value];
          expect(codes).to.include("FRA");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: "Matchs filtered by team[code]: FRA"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
