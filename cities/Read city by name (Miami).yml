info:
  name: Read city by name (Miami)
  type: http
  seq: 5

http:
  method: GET
  url: "{{host}}/cities/Miami"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: City Miami
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data.name
      operator: eq
      value: Miami
    - expression: res.body.data.country
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
