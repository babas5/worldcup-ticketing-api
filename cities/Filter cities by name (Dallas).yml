info:
  name: Filter cities by name (Dallas)
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/cities?name=dallas"
  params:
    - name: name
      value: dallas
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: "Cities filtered by name: dallas"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].name
      operator: isDefined
    - expression: res.body.data[0].country.name
      operator: isDefined
    - expression: res.body.data[0].country.code
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
