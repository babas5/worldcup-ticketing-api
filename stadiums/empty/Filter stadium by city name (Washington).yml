info:
  name: Filter stadium by city name (Washington)
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/stadiums?city[name]=washington"
  params:
    - name: city[name]
      value: washington
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: Stadiums filtered by city[name]
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
