info:
  name: Read all stadiums
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/stadiums"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: All stadiums
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].name
      operator: isDefined
    - expression: res.body.data[0].country.name
      operator: isDefined
    - expression: res.body.data[0].country.code
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
