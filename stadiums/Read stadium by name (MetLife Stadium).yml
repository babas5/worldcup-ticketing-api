info:
  name: Read stadium by name (MetLife Stadium)
  type: http
  seq: 12

http:
  method: GET
  url: "{{host}}/stadiums/MetLife Stadium"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Stadium MetLife Stadium
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data.name
      operator: eq
      value: MetLife Stadium
    - expression: res.body.data.city
      operator: isDefined
    - expression: res.body.data.capacity
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
