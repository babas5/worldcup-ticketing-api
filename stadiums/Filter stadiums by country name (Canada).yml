info:
  name: Filter stadiums by country name (Canada)
  type: http
  seq: 9

http:
  method: GET
  url: "{{host}}/stadiums?country[name]=canada"
  params:
    - name: country[name]
      value: canada
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((stadium) => {
          expect(stadium.city.country.code).to.equal("ca");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: Stadiums filtered by country[name]
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].name
      operator: isDefined
    - expression: res.body.data[0].city
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
