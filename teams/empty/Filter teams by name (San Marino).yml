info:
  name: Filter teams by name (San Marino)
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/teams?name=san marino"
  params:
    - name: name
      value: san marino
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: "Teams filtered by name:"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: res.body.data
      operator: isEmpty
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
