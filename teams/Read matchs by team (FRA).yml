info:
  name: Read matchs by team (FRA)
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/teams/FRA/matchs"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((match) => {
          const codes = [match.homeTeam.code.value, match.awayTeam.code.value];
          expect(codes).to.include("FRA");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Matchs for team FRA
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].homeTeam
      operator: isDefined
    - expression: res.body.data[0].awayTeam
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
