info:
  name: Filter teams by name (France)
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/teams?name=france"
  params:
    - name: name
      value: france
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((team) => {
          expect(team.name.toLowerCase()).to.include("france");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: contains
      value: "Teams filtered by name: france"
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data[0].name
      operator: isDefined
    - expression: res.body.data[0].code.value
      operator: isDefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
