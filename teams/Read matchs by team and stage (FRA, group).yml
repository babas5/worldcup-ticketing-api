info:
  name: Read matchs by team and stage (FRA, group)
  type: http
  seq: 6

http:
  method: GET
  url: "{{host}}/teams/FRA/matchs/group"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        res.body.data.forEach((match) => {
          const codes = [match.homeTeam.code.value, match.awayTeam.code.value];
          expect(codes).to.include("FRA");
          expect(match.stage).to.equal("group");
        });
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Matchs for team FRA at stage group
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
