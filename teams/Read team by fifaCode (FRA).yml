info:
  name: Read team by fifaCode (FRA)
  type: http
  seq: 4

http:
  method: GET
  url: "{{host}}/teams/FRA"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: Team FRA
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isJson
    - expression: req.method
      operator: eq
      value: GET
    - expression: res.body.data.name
      operator: eq
      value: France
    - expression: res.body.data.code.value
      operator: eq
      value: FRA

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
