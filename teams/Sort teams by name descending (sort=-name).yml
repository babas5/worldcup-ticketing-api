info:
  name: Sort teams by name descending (sort=-name)
  type: http
  seq: 4

http:
  method: GET
  url: "{{host}}/teams?sort=-name"
  params:
    - name: sort
      value: -name
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const names = res.body.data.map((team) => team.name);
        const sorted = [...names].sort((a, b) => b.localeCompare(a));
        expect(names).to.deep.equal(sorted);
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isTruthy
    - expression: res.body.message
      operator: eq
      value: All teams
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data
      operator: isArray
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
