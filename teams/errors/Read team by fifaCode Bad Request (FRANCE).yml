info:
  name: Read team by fifaCode Bad Request (FRANCE)
  type: http
  seq: 4

http:
  method: GET
  url: "{{host}}/teams/FRANCE"
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isFalsy
    - expression: res.body.error
      operator: eq
      value: 'Invalid FIFA code: "FRANCE"'
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
