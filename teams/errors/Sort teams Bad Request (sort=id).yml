info:
  name: Sort teams Bad Request (sort=id)
  type: http
  seq: 5

http:
  method: GET
  url: "{{host}}/teams?sort=id"
  params:
    - name: sort
      value: id
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isJson
    - expression: res.body.success
      operator: isFalsy
    - expression: res.body.message
      operator: contains
      value: "Invalid sort value:"
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: req.method
      operator: eq
      value: GET

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
